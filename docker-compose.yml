services:
  frontend:
    container_name: shopworthy-frontend
    image: shopworthy/frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
      # Optional: pass VITE_API_URL to point frontend at a specific API (e.g. different host).
      # Omit for same-origin: use http://localhost:3000 or http://<machine-ip>:3000 — API is proxied.
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    container_name: shopworthy-api
    image: shopworthy/api:latest
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - JWT_SECRET=shopworthy-secret-2024
      - DB_PATH=./data/shopworthy.db
      - INVENTORY_URL=http://inventory:5000
      - PAYMENT_URL=http://payments:6000
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/internal/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  inventory:
    container_name: shopworthy-inventory
    image: shopworthy/inventory:latest
    build:
      context: ../inventory
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://shopworthy:shopworthy123@postgres:5432/inventory
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  payments:
    container_name: shopworthy-payments
    image: shopworthy/payments:latest
    build:
      context: ../payments
      dockerfile: Dockerfile
    ports:
      - "6000:6000"
      - "8082:8082"
    environment:
      - GATEWAY_API_KEY=sk_live_shopworthy_gateway_abc123xyz
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  admin:
    container_name: shopworthy-admin
    image: shopworthy/admin:latest
    build:
      context: ../admin
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://shopworthy:shopworthy123@postgres:5432/inventory
      - SECRET_KEY=admin-secret
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/admin/login"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    container_name: shopworthy-postgres
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=shopworthy
      - POSTGRES_PASSWORD=shopworthy123
      - POSTGRES_DB=inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopworthy -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
