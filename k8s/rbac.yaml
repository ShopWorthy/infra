apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shopworthy-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin           # Full cluster-admin bound to all service accounts
subjects:
  - kind: ServiceAccount
    name: default
    namespace: shopworthy
