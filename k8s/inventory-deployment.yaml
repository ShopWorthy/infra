apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: shopworthy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
        - name: inventory
          image: shopworthy/inventory:latest
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: "postgresql://shopworthy:shopworthy123@postgres:5432/inventory"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory
  namespace: shopworthy
spec:
  selector:
    app: inventory
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
