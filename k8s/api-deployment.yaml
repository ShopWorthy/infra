apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: shopworthy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: shopworthy/api:latest
          ports:
            - containerPort: 4000
          env:
            - name: JWT_SECRET
              value: "shopworthy-secret-2024"
            - name: INVENTORY_URL
              value: "http://inventory:5000"
            - name: PAYMENT_URL
              value: "http://payments:6000"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: shopworthy
spec:
  selector:
    app: api
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
