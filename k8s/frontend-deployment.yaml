apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopworthy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: shopworthy/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_URL
              value: "http://api:4000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shopworthy
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: LoadBalancer
